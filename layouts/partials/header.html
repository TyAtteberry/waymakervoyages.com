<header id="header" class="header sticky-top">
  <div class="topbar d-flex align-items-center dark-background">
    <div class="container d-flex justify-content-center justify-content-md-between">
      <div class="contact-info d-flex align-items-center">
        <i class="bi bi-envelope d-flex align-items-center">
          <a href="mailto:info@WayMakerVoyages.com">info@WayMakerVoyages.com</a>
        </i>
        <i class="bi bi-phone d-flex align-items-center ms-4">
          <span>+1 (919) 500-6541</span>
        </i>
      </div>
      <div class="social-links d-none d-md-flex align-items-center">
        {{ with site.Params.social.instagram }}<a href="{{ . }}" class="instagram"><i class="bi bi-instagram"></i></a>{{ end }}
        {{ with site.Params.social.facebook }}<a href="{{ . }}" class="facebook"><i class="bi bi-facebook"></i></a>{{ end }}
        {{ with site.Params.social.linkedin }}<a href="{{ . }}" class="linkedin"><i class="bi bi-linkedin"></i></a>{{ end }}
      </div>
    </div>
  </div>

  <div class="branding d-flex align-items-center">
    <div class="container position-relative d-flex align-items-center justify-content-between">
      <a href="/" class="logo d-flex align-items-center">
        <img src="/assets/img/logo.png" alt="WayMaker Voyages Logo" />
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="/" class="active">Home</a></li>
          <li><a href="/#why">Why WayMaker</a></li>
          <li><a href="/#adventure">Adventures</a></li>
          <li><a href="/itinerary/">Itinerary</a></li>
          <li><a href="/#pricing">Pricing</a></li>
          <li><a href="/daily-devotions">Devotions</a></li>
          <li><a href="/#gift">Gift a Voyage</a></li>
          <li><a href="/#contact">Contact</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>
    </div>
  </div>
</header>
